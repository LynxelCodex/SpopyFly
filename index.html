<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotify Clone</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <!-- Google Fonts: Circular-like substitute -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ═══════════════════════════════════════════════
       HIDDEN YOUTUBE IFRAME PLAYER
       The actual YouTube player is invisible.
       All controls are driven by the custom UI below.
  ════════════════════════════════════════════════ -->
  <div id="yt-player-wrapper" aria-hidden="true">
    <div id="yt-player"></div>
  </div>

  <!-- ═══════════════════════════════════════════════
       APP SHELL
  ════════════════════════════════════════════════ -->
  <div class="app-shell">

    <!-- ── LEFT SIDEBAR ───────────────────────────── -->
    <aside class="sidebar" id="sidebar">

      <!-- Logo -->
      <div class="sidebar-logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="12" fill="#1DB954"/>
          <path d="M17.9 10.9C14.7 9 9.35 8.8 6.3 9.75c-.5.15-1-.15-1.15-.6-.15-.5.15-1 .6-1.15 3.55-1.05 9.4-.85 13.1 1.35.45.25.6.85.35 1.3-.25.35-.85.5-1.3.25zm-.1 2.8c-.25.35-.75.5-1.1.25-2.7-1.65-6.8-2.15-9.95-1.15-.4.1-.85-.1-.95-.5-.1-.4.1-.85.5-.95 3.65-1.1 8.15-.55 11.25 1.35.3.15.45.65.25 1zm-1.25 2.75c-.2.3-.6.4-.9.2-2.35-1.45-5.35-1.75-8.85-.95-.35.1-.65-.15-.75-.45-.1-.35.15-.65.45-.75 3.85-.85 7.1-.5 9.7 1.1.35.15.4.55.35.85z" fill="#000"/>
        </svg>
        <span class="logo-text">Spotify</span>
      </div>

      <!-- Main Nav -->
      <nav class="sidebar-nav" role="navigation" aria-label="Main navigation">
        <button class="nav-item active" data-view="home">
          <i data-lucide="home" class="nav-icon"></i>
          <span>Home</span>
        </button>
        <button class="nav-item" data-view="search">
          <i data-lucide="search" class="nav-icon"></i>
          <span>Search</span>
        </button>
        <button class="nav-item" data-view="library">
          <i data-lucide="library" class="nav-icon"></i>
          <span>Your Library</span>
        </button>
      </nav>

      <!-- Sidebar Divider -->
      <div class="sidebar-divider"></div>

      <!-- Playlists section -->
      <div class="sidebar-section">
        <div class="sidebar-section-header">
          <i data-lucide="plus-circle" class="section-icon"></i>
          <span>Create Playlist</span>
        </div>
        <div class="sidebar-section-header liked">
          <i data-lucide="heart" class="section-icon liked-icon"></i>
          <span>Liked Songs</span>
        </div>
      </div>

      <div class="sidebar-divider"></div>

      <!-- Genre links (static) -->
      <div class="sidebar-links">
        <a href="#" class="sidebar-link">Cookies</a>
        <a href="#" class="sidebar-link">Privacy Center</a>
        <a href="#" class="sidebar-link">About</a>
      </div>
    </aside>

    <!-- Sidebar toggle (mobile) -->
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
      <i data-lucide="menu"></i>
    </button>

    <!-- ── MAIN CONTENT ───────────────────────────── -->
    <main class="main-content" id="mainContent">

      <!-- TOP BAR -->
      <div class="topbar">
        <div class="topbar-nav">
          <button class="topbar-btn" id="navBack" aria-label="Go back">
            <i data-lucide="chevron-left"></i>
          </button>
          <button class="topbar-btn" id="navFwd" aria-label="Go forward">
            <i data-lucide="chevron-right"></i>
          </button>
        </div>
        <div class="topbar-search-wrap" id="topbarSearchWrap">
          <i data-lucide="search" class="topbar-search-icon"></i>
          <input type="text" id="searchInput" class="topbar-search" placeholder="What do you want to listen to?" autocomplete="off" />
        </div>
        <div class="topbar-profile">
          <button class="profile-btn" aria-label="User profile">
            <i data-lucide="user-circle"></i>
          </button>
        </div>
      </div>

      <!-- ── VIEW: HOME ───────────────────── -->
      <div class="view active" id="view-home">
        <section class="content-section">
          <h2 class="section-title">Good Evening</h2>
          <!-- Featured quick-play grid (top 6 tracks) -->
          <div class="featured-grid" id="featuredGrid"></div>
        </section>

        <section class="content-section">
          <div class="section-header-row">
            <h2 class="section-title">All Tracks</h2>
            <button class="show-all-btn">Show all</button>
          </div>
          <!-- Main track cards grid injected by JS -->
          <div class="track-grid" id="trackGrid"></div>
        </section>

        <section class="content-section">
          <h2 class="section-title">Recently Played</h2>
          <div class="track-grid" id="recentGrid"></div>
        </section>
      </div>

      <!-- ── VIEW: SEARCH ───────────────── -->
      <div class="view" id="view-search">
        <section class="content-section">
          <h2 class="section-title">Search Results</h2>
          <div class="track-grid" id="searchGrid">
            <p class="empty-state">Start typing to search tracks…</p>
          </div>
        </section>
        <section class="content-section">
          <h2 class="section-title">Browse Categories</h2>
          <div class="category-grid" id="categoryGrid"></div>
        </section>
      </div>

      <!-- ── VIEW: LIBRARY ─────────────── -->
      <div class="view" id="view-library">
        <section class="content-section">
          <h2 class="section-title">Your Library</h2>
          <div class="library-list" id="libraryList"></div>
        </section>
      </div>

    </main>
  </div>

  <!-- ═══════════════════════════════════════════════
       FIXED BOTTOM PLAYER BAR
  ════════════════════════════════════════════════ -->
  <footer class="player-bar" id="playerBar" role="region" aria-label="Music player">

    <!-- Track Info -->
    <div class="player-track-info">
      <div class="player-cover-wrap">
        <img id="playerCover" src="https://i.scdn.co/image/ab67616d0000b273placeholder" alt="Album Art" />
        <div class="player-cover-overlay">
          <i data-lucide="music" class="cover-music-icon"></i>
        </div>
      </div>
      <div class="player-meta">
        <span class="player-title" id="playerTitle">Select a track</span>
        <span class="player-artist" id="playerArtist">—</span>
      </div>
      <button class="player-like-btn" id="playerLike" aria-label="Like track">
        <i data-lucide="heart"></i>
      </button>
    </div>

    <!-- Controls -->
    <div class="player-controls">
      <div class="control-buttons">
        <button class="ctrl-btn secondary" id="btnShuffle" aria-label="Shuffle">
          <i data-lucide="shuffle"></i>
        </button>
        <button class="ctrl-btn secondary" id="btnPrev" aria-label="Previous track">
          <i data-lucide="skip-back"></i>
        </button>
        <button class="ctrl-btn primary" id="btnPlayPause" aria-label="Play / Pause">
          <i data-lucide="play" id="playIcon"></i>
        </button>
        <button class="ctrl-btn secondary" id="btnNext" aria-label="Next track">
          <i data-lucide="skip-forward"></i>
        </button>
        <button class="ctrl-btn secondary" id="btnRepeat" aria-label="Repeat">
          <i data-lucide="repeat"></i>
        </button>
      </div>

      <!-- Progress / Seek Bar -->
      <div class="progress-wrap">
        <span class="time-label" id="currentTime">0:00</span>
        <div class="progress-track">
          <div class="progress-fill" id="progressFill"></div>
          <input type="range" id="seekBar" class="seek-bar" min="0" max="100" value="0" step="0.1" aria-label="Seek" />
        </div>
        <span class="time-label" id="totalTime">0:00</span>
      </div>
    </div>

    <!-- Volume & Extra Controls -->
    <div class="player-extras">
      <button class="ctrl-btn secondary small" id="btnQueue" aria-label="Queue">
        <i data-lucide="list-music"></i>
      </button>
      <button class="ctrl-btn secondary small" id="btnDevice" aria-label="Devices">
        <i data-lucide="monitor-speaker"></i>
      </button>
      <div class="volume-wrap">
        <button class="ctrl-btn secondary small" id="btnMute" aria-label="Mute">
          <i data-lucide="volume-2" id="volIcon"></i>
        </button>
        <div class="volume-track">
          <div class="volume-fill" id="volumeFill"></div>
          <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="70" aria-label="Volume" />
        </div>
      </div>
      <button class="ctrl-btn secondary small" id="btnFullscreen" aria-label="Fullscreen">
        <i data-lucide="maximize-2"></i>
      </button>
    </div>
  </footer>

  <!-- ═══════════════════════════════════════════════
       NOW PLAYING OVERLAY (full-screen expand)
  ════════════════════════════════════════════════ -->
  <div class="now-playing-overlay" id="nowPlayingOverlay">
    <button class="overlay-close" id="overlayClose" aria-label="Close">
      <i data-lucide="chevron-down"></i>
    </button>
    <div class="overlay-art">
      <img id="overlayArt" src="" alt="Album Art Large" />
    </div>
    <div class="overlay-info">
      <span class="overlay-title" id="overlayTitle">—</span>
      <span class="overlay-artist" id="overlayArtist">—</span>
    </div>
  </div>

  <!-- Script last for performance -->
  <script src="script.js"></script>
</body>
</html>
