<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpopyFly - Music Player</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Hidden YouTube Player (Audio Source) -->
  <div id="yt-player-wrapper">
    <div id="yt-player"></div>
  </div>

  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="logo">
        <i data-lucide="play-circle" style="color:#1DB954"></i> <span>SpopyFly</span>
      </div>
      <nav class="nav-menu">
        <button class="nav-link active" data-view="home"><i data-lucide="home"></i> Home</button>
        <button class="nav-link" data-view="search"><i data-lucide="search"></i> Search</button>
        <button class="nav-link" data-view="library"><i data-lucide="library"></i> Your Library</button>
      </nav>
      <div class="sidebar-divider"></div>
      <div class="sidebar-extra">
        <button class="nav-link"><i data-lucide="plus-square"></i> Create Playlist</button>
        <button class="nav-link"><i data-lucide="heart"></i> Liked Songs</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="top-bar">
        <button id="mobile-toggle" class="icon-btn"><i data-lucide="menu"></i></button>
        <div class="search-container" id="searchBar" style="display:none;">
          <i data-lucide="search"></i>
          <input type="text" id="searchInput" placeholder="What do you want to listen to?">
        </div>
        <div class="user-profile"><i data-lucide="user"></i></div>
      </header>

      <!-- View: Home -->
      <section id="view-home" class="view active">
        <h1 id="greeting">Good Evening</h1>
        <div class="featured-grid" id="featuredGrid"></div>
        <h2 class="section-title">Artists</h2>
        <div class="artist-grid" id="artistGrid"></div>
        <h2 class="section-title">All Songs</h2>
        <div class="track-grid" id="trackGrid"></div>
      </section>

      <!-- View: Search -->
      <section id="view-search" class="view">
        <h1 class="section-title">Search Results</h1>
        <div class="track-grid" id="searchGrid">
          <p class="empty-state">Start typing to find music...</p>
        </div>
      </section>

      <!-- View: Artist Detail -->
      <section id="view-artist" class="view">
        <button id="backBtn" class="back-btn"><i data-lucide="arrow-left"></i> Back</button>
        <div class="artist-header">
          <h1 id="artistNameDisplay">Artist Name</h1>
        </div>
        <div class="track-grid" id="artistTrackList"></div>
      </section>
    </main>
  </div>

  <!-- Player Bar -->
  <footer class="player-bar">
    <div class="current-track">
      <img id="playerCover" src="https://via.placeholder.com/56" alt="Cover">
      <div class="track-info">
        <div id="playerTitle">Select a track</div>
        <div id="playerArtist">-</div>
      </div>
      <i data-lucide="heart" class="heart-icon"></i>
    </div>

    <div class="controls-container">
      <div class="playback-btns">
        <button class="icon-btn" id="btnShuffle"><i data-lucide="shuffle"></i></button>
        <button class="icon-btn" id="btnPrev"><i data-lucide="skip-back"></i></button>
        <button class="play-btn" id="btnPlayPause"><i data-lucide="play" id="playIcon"></i></button>
        <button class="icon-btn" id="btnNext"><i data-lucide="skip-forward"></i></button>
        <button class="icon-btn" id="btnRepeat"><i data-lucide="repeat"></i></button>
      </div>
      <div class="progress-bar-wrap">
        <span id="timeCurrent">0:00</span>
        <div class="progress-bg"><div id="progressFill"></div></div>
        <span id="timeTotal">0:00</span>
      </div>
    </div>

    <div class="extra-controls">
      <button class="icon-btn" id="btnVideo" title="Watch Music Video"><i data-lucide="tv"></i></button>
      <i data-lucide="volume-2"></i>
      <input type="range" id="volumeSlider" min="0" max="100" value="70">
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
