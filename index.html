<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpopyFly</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Hidden YT Player -->
    <div id="yt-player-wrapper" style="position:fixed; top:-999px; left:-999px; width:1px; height:1px;">
        <div id="yt-player"></div>
    </div>

    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-logo">SpopyFly</div>
            <nav class="sidebar-nav">
                <button class="nav-item active" data-view="home"><i data-lucide="home"></i> Home</button>
                <button class="nav-item" data-view="search"><i data-lucide="search"></i> Search</button>
                <button class="nav-item" data-view="library"><i data-lucide="library"></i> Library</button>
            </nav>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div class="topbar-search-wrap" id="searchWrap" style="display:none;">
                    <input type="text" id="searchInput" placeholder="Search songs...">
                </div>
            </header>

            <!-- Views -->
            <div id="view-home" class="view active">
                <h1 id="greeting">Welcome</h1>
                <div class="track-grid" id="trackGrid"></div>
            </div>

            <div id="view-search" class="view">
                <h1>Search</h1>
                <div class="track-grid" id="searchGrid"></div>
            </div>

            <div id="view-artist" class="view">
                <button id="backBtn">← Back</button>
                <h1 id="artistName">Artist</h1>
                <div class="track-grid" id="artistTrackList"></div>
            </div>
        </main>
    </div>

    <!-- Video Overlay -->
    <div id="videoOverlay" class="video-overlay">
        <button id="closeVideo">Close X</button>
        <div id="videoContainer"></div>
    </div>

    <footer class="player-bar">
        <div class="player-info">
            <img id="playerCover" src="" alt="">
            <div>
                <div id="playerTitle">Select a song</div>
                <div id="playerArtist">-</div>
            </div>
        </div>
        <div class="player-controls">
            <button id="btnPrev">Prev</button>
            <button id="btnPlayPause">Play</button>
            <button id="btnNext">Next</button>
            <div class="progress-bar"><div id="progressFill"></div></div>
        </div>
        <div class="player-extras">
            <button id="btnVideo">Watch Video</button>
            <input type="range" id="volumeSlider" min="0" max="100" value="70">
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
